name = "cnk-mitatecho"
compatibility_date = "2025-01-25"
pages_build_output_dir = "out"

[placement]
mode = "smart"
hint = "wnam"

[[d1_databases]]
binding = "DB"
database_name = "prairie-cnk-db"
database_id = "dc61e8a3-e575-4abb-93d5-e0eca85ae039"

# NOTE: Rate Limiting binding (SUBMIT_RATE_LIMITER) は Pages では
# wrangler.toml で定義できないため、Cloudflare Dashboard から設定する。
# Pages → cnk-mitatecho → Settings → Functions → Bindings → Add Rate Limiter
#   Variable name: SUBMIT_RATE_LIMITER
#   Namespace ID: 1001
#   Limit: 10 requests / 60 seconds
